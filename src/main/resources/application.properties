spring.application.name=riskmanager
server.port=8081
spring.profiles.active=dev
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
#Port 8081 to distinguish from docker container
spring.ai.anthropic.api-key=${CLAUDE_API_KEY}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5
spring.ai.anthropic.chat.options.max-tokens=4096
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Ollama - used for document embeddings
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.embedding.options.model=nomic-embed-text

# Weaviate vector store
spring.ai.vectorstore.weaviate.scheme=http
spring.ai.vectorstore.weaviate.host=localhost:8080
spring.ai.vectorstore.weaviate.object-class=SpringAiWeaviate