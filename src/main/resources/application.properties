spring.application.name=riskmanager
server.port=8080
spring.profiles.active=dev
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
spring.ai.anthropic.api-key=${CLAUDE_API_KEY}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5
spring.ai.anthropic.chat.options.max-tokens=4096
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Ollama - used for document embeddings
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.embedding.options.model=nomic-embed-text

# Weaviate vector store
spring.ai.vectorstore.weaviate.scheme=http
spring.ai.vectorstore.weaviate.host=localhost:8081
spring.ai.vectorstore.weaviate.object-class=SpringAiWeaviate

#OAUTH github + google
logging.level.org.springframework.security=TRACE

spring.security.oauth2.client.registration.google.client-id=${oauth2_google_id}
spring.security.oauth2.client.registration.google.client-secret=${oauth2_google_secret}

spring.security.oauth2.client.registration.github.client-id=${oauth2_github_id}
spring.security.oauth2.client.registration.github.client-secret=${oauth2_github_secret}