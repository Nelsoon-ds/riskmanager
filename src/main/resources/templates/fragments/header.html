<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header" class="site-header">
    <div class="site-header-inner">

        <a href="/home" class="header-brand">
            <div class="header-logo">R</div>
            <span class="header-brand-name">RiskLens</span>
        </a>

        <nav class="site-nav">
            <a href="/home" class="nav-link"
               th:classappend="${currentPage == 'analyze' ? ' active' : ''}">
                Analyze
            </a>
            <a href="/admin" class="nav-link"
               th:classappend="${currentPage == 'admin' ? ' active' : ''}">
                Admin
            </a>
        </nav>

        <div class="header-user">
            <div class="user-chip">
                <span class="user-initials"
                      th:text="${userName != null ? userName.substring(0, 1).toUpperCase() : '?'}">U</span>
                <span class="user-name" th:text="${userName != null ? userName : 'User'}">User</span>
            </div>
            <form th:action="@{/logout}" method="post" style="margin:0">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </div>

    </div>
</header>
</body>
</html>
